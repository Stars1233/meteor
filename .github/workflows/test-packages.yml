name: Test Packages

on:
  pull_request:
    paths:
      - "packages/**"
      - ".github/workflows/test-packages.yml"

env:
  SELF_HOSTED_MIN_FREE_GB: "20"
  SELF_HOSTED_RUNNER_CLEANUP_PATH: scripts/ci/self-hosted-runner-cleanup.js
  # This runs before checkout, so fetch the script from the current ref instead
  # of relying on whatever the runner workspace happens to contain.
  SELF_HOSTED_RUNNER_CLEANUP_LOADER: |
    const fs = require("node:fs");
    const os = require("node:os");
    const path = require("node:path");
    const { owner, repo } = context.repo;
    const scriptPath = process.env.SELF_HOSTED_RUNNER_CLEANUP_PATH;
    const { data } = await github.rest.repos.getContent({
      owner,
      repo,
      path: scriptPath,
      ref: context.sha,
    });
    const tempDir = fs.mkdtempSync(path.join(os.tmpdir(), "self-hosted-runner-cleanup-"));
    const tempFile = path.join(tempDir, path.basename(scriptPath));

    fs.writeFileSync(tempFile, Buffer.from(data.content, "base64"));

    try {
      const cleanup = require(tempFile);
      await cleanup();
    } finally {
      fs.rmSync(tempDir, { recursive: true, force: true });
    }

jobs:
  test-packages:
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true
    runs-on: oss-vm
    timeout-minutes: 90
    env:
      CXX: g++-12
      phantom: false
      PUPPETEER_DOWNLOAD_PATH: /home/runner/.npm/chromium
      TEST_PACKAGES_EXCLUDE: stylus
      METEOR_MODERN: true
      NODE_ENV: CI

    steps:
      - name: Clean self-hosted runner
        uses: actions/github-script@v7
        with:
          script: ${{ env.SELF_HOSTED_RUNNER_CLEANUP_LOADER }}

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          submodules: recursive

      - name: Expose globally-installed puppeteer to Node.js
        # puppeteer@23.6.0 is pre-installed on oss-vm via `npm install -g`.
        # Setting NODE_PATH lets `require('puppeteer')` resolve it directly,
        # so run.sh skips the slow `./meteor npm install -g puppeteer` step.
        run: echo "NODE_PATH=$(npm root -g)" >> "$GITHUB_ENV"

      - name: Restore caches
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            .meteor
            .babel-cache
            dev_bundle
          key: ${{ runner.os }}-meteor-${{ hashFiles('meteor', '**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-meteor-

      - name: Run test-in-console suite
        run: |
          export TEST_PACKAGES_EXCLUDE="stylus"
          export METEOR_MODERN="true"
          export NODE_ENV="CI"
          export CXX="g++-12"
          export phantom="false"
          export TIMEOUT_SCALE_FACTOR="20"
          export METEOR_HEADLESS="true"
          ./packages/test-in-console/run.sh
