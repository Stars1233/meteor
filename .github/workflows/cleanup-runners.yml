name: Manual Runner Cleanup

on:
  workflow_dispatch:
    inputs:
      runner_label:
        description: 'The runner label to run the cleanup on (e.g., oss-vm)'
        required: true
        default: 'oss-vm'
        type: string
      min_free_gb:
        description: 'Minimum free disk space in GiB. If free space is below this, Docker prune will run.'
        required: true
        default: '20'
        type: string

jobs:
  cleanup:
    name: Cleanup (${{ inputs.runner_label }})
    runs-on: ${{ inputs.runner_label }}
    steps:
      - name: Run runner cleanup
        uses: actions/github-script@v7
        env:
          SELF_HOSTED_MIN_FREE_GB: ${{ inputs.min_free_gb }}
        with:
          script: |
            const { data } = await github.rest.repos.getContent({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path: ".github/scripts/run-self-hosted-runner-cleanup.js",
              ref: context.sha,
            });
            const loaderSource = data.content.replace(/\n/g, "");
            await (await import(`data:text/javascript;base64,${loaderSource}`)).default({
              github,
              context,
            });
