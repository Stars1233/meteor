name: Unit Tests

on:
  pull_request:
    paths:
      - 'tools/**'
      - 'scripts/**'
      - 'jest.config.js'
      - 'package.json'
      - '.github/workflows/unit-tests.yml'
  push:
    branches:
      - devel

concurrency:
  group: unit-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x

      - name: Install deps
        run: npm install

      - name: Run unit tests
        run: npm run test:unit
