name: Warn — testless package changes

on:
  pull_request:
    paths:
      - "packages/**"

jobs:
  check:
    name: Check for testless package changes
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Need the full base commit to diff against, not just the tip.
          fetch-depth: 0

      - name: Find changed testless packages
        id: check
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          # Collect the unique package directory names touched by this PR.
          changed=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" \
            | grep '^packages/' \
            | cut -d/ -f2 \
            | sort -u)

          testless=""
          for pkg in $changed; do
            pkg_js="packages/$pkg/package.js"
            # A package "has tests" when its package.js contains Package.onTest.
            if [ -f "$pkg_js" ] && ! grep -q 'Package\.onTest' "$pkg_js"; then
              testless="$testless $pkg"
            fi
          done

          # Trim leading space and export for the next step.
          testless="${testless# }"
          echo "testless=$testless" >> "$GITHUB_OUTPUT"

          if [ -n "$testless" ]; then
            echo "The following changed packages have no tests: $testless"
          fi

      - name: Post or update PR comment
        if: steps.check.outputs.testless != ''
        uses: actions/github-script@v7
        with:
          script: |
            const MARKER = '<!-- warn-testless-packages -->';
            const pkgs = `${{ steps.check.outputs.testless }}`.trim().split(/\s+/);
            const list = pkgs.map(p => `- \`${p}\``).join('\n');

            const body = [
              MARKER,
              '## ⚠️ Changes to packages without tests',
              '',
              'The following package(s) modified in this PR have no `Package.onTest`',
              'block and are **excluded from the automated test suite**:',
              '',
              list,
              '',
              'Please either:',
              '- Add a `Package.onTest` block to each package and include it in the',
              '  [`test-packages` workflow](.github/workflows/test-packages.yml), or',
              '- Make sure the change is covered by tests in another package that',
              '  depends on this one and is already in the test matrix.',
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body.includes(MARKER));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
